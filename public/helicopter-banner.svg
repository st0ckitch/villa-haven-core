<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4ec"/>
      <stop offset="100%" stop-color="#f7faf6"/>
    </linearGradient>
    <linearGradient id="heli" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d8f43"/>
      <stop offset="100%" stop-color="#1f6b30"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8d8b4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6db580" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="rotorBlur" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2d8f43" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#2d8f43" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2d8f43" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d8f43" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2d8f43" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="1600" height="600" fill="url(#sky)"/>

  <!-- Soft distant hills -->
  <path d="M0,460 Q200,400 400,430 T800,420 T1200,440 T1600,420 L1600,600 L0,600 Z" fill="url(#hill)"/>
  <path d="M0,500 Q300,460 600,480 T1200,490 T1600,480 L1600,600 L0,600 Z" fill="url(#hill)" opacity="0.6"/>

  <!-- Sun glow -->
  <circle cx="1300" cy="160" r="180" fill="#2d8f43" opacity="0.06"/>
  <circle cx="1300" cy="160" r="90" fill="#2d8f43" opacity="0.05"/>

  <!-- Helicopter group, centered around (820, 270) -->
  <g transform="translate(820 270)">
    <!-- Rotor blur disc -->
    <ellipse cx="0" cy="-110" rx="320" ry="14" fill="url(#rotorBlur)"/>
    <ellipse cx="0" cy="-110" rx="280" ry="6" fill="#2d8f43" opacity="0.18"/>

    <!-- Main rotor mast -->
    <rect x="-4" y="-110" width="8" height="38" rx="2" fill="url(#heli)"/>
    <circle cx="0" cy="-110" r="10" fill="#1f6b30"/>

    <!-- Rotor blades (faint, rotating illusion) -->
    <rect x="-310" y="-113" width="620" height="6" rx="3" fill="#2d8f43" opacity="0.45"/>
    <rect x="-310" y="-113" width="620" height="6" rx="3" fill="#1f6b30" opacity="0.25" transform="rotate(8)"/>

    <!-- Body shadow -->
    <ellipse cx="20" cy="100" rx="220" ry="14" fill="#1f6b30" opacity="0.18"/>

    <!-- Tail boom -->
    <path d="M 80,-30 L 360,-10 L 380,10 L 360,20 L 80,10 Z" fill="url(#heli)"/>

    <!-- Tail fin -->
    <path d="M 340,-40 L 400,-50 L 410,10 L 380,10 Z" fill="#1f6b30"/>
    <!-- Tail rotor -->
    <circle cx="395" cy="-15" r="22" fill="none" stroke="#2d8f43" stroke-width="2" opacity="0.5"/>
    <line x1="395" y1="-37" x2="395" y2="7" stroke="#1f6b30" stroke-width="3"/>
    <line x1="373" y1="-15" x2="417" y2="-15" stroke="#1f6b30" stroke-width="3" opacity="0.6"/>

    <!-- Main fuselage -->
    <path d="M -180,-40
             Q -200,0 -170,50
             L 100,60
             Q 160,50 170,10
             L 160,-50
             Q 100,-90 -20,-95
             Q -130,-95 -180,-40 Z"
          fill="url(#heli)"/>

    <!-- Cockpit windshield -->
    <path d="M -170,-20
             Q -180,15 -150,40
             L -30,45
             Q 30,40 50,5
             L 30,-50
             Q -30,-75 -110,-70
             Q -160,-65 -170,-20 Z"
          fill="url(#glass)"/>
    <path d="M -150,-10 Q -155,18 -130,35 L -40,38 Q 10,33 25,5 L 8,-40 Q -40,-58 -100,-55 Q -140,-50 -150,-10 Z"
          fill="#ffffff" opacity="0.25"/>

    <!-- Side window divider -->
    <line x1="-30" y1="-50" x2="-10" y2="45" stroke="#1f6b30" stroke-width="2" opacity="0.6"/>

    <!-- Landing skids -->
    <line x1="-160" y1="120" x2="160" y2="120" stroke="#1f6b30" stroke-width="5" stroke-linecap="round"/>
    <line x1="-100" y1="60" x2="-130" y2="120" stroke="#1f6b30" stroke-width="4" stroke-linecap="round"/>
    <line x1="100" y1="60" x2="130" y2="120" stroke="#1f6b30" stroke-width="4" stroke-linecap="round"/>
    <line x1="-40" y1="60" x2="-60" y2="120" stroke="#1f6b30" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="40" y1="60" x2="60" y2="120" stroke="#1f6b30" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

    <!-- Door outline -->
    <rect x="-90" y="-15" width="50" height="55" rx="6" fill="none" stroke="#1f6b30" stroke-width="2" opacity="0.45"/>

    <!-- Highlight strip -->
    <path d="M -160,15 Q -100,30 80,28" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.35" stroke-linecap="round"/>
  </g>

  <!-- Faint horizon lines -->
  <line x1="0" y1="430" x2="1600" y2="430" stroke="#2d8f43" stroke-width="1" opacity="0.08"/>
</svg>
