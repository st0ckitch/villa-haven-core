<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polograph — Premium Villa Development</title>
    <meta name="description" content="Discover premium villas at Polograph in Georgia. Find your dream home with modern architecture, elegant interiors, and world-class amenities.">
    <meta name="author" content="Polograph" />

    <!-- Favicons (replaces the default Lovable heart). The .ico carries
         16/32/48/64/128/256 — modern browsers prefer the PNG hints below. -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    
    
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Preload the two FiraGO weights that always show on first paint
         (body 300, headings 600). Other weights load lazily on demand. -->
    <link rel="preload" href="/fonts/bpg/arial-geo-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/bpg/mrgvlovani-caps.woff2" as="font" type="font/woff2" crossorigin />
    <meta property="og:title" content="Polograph — Premium Villa Development">
  <meta name="twitter:title" content="Polograph — Premium Villa Development">
  <meta property="og:description" content="Discover premium villas at Polograph in Georgia. Find your dream home with modern architecture, elegant interiors, and world-class amenities.">
  <meta name="twitter:description" content="Discover premium villas at Polograph in Georgia. Find your dream home with modern architecture, elegant interiors, and world-class amenities.">
  <!-- OG / Twitter preview image. Was pointing to og-preview.jpg which had
       "POLOGRAPH · Premium Villa Development · Tbilisi" baked into the JPG.
       Client wanted the city tag gone (2026-05-31). Swapped to the clean
       aerial render — no text overlay = no city tag. Social platforms render
       the page title separately from og:title, so the image is now purely
       visual. Width/height intentionally omitted: the aerial isn't the
       1200×630 OG spec ratio, and overstating dimensions causes Facebook to
       reject the image; without the hint the platforms fall back to the
       image's actual size and centre-crop. -->
  <meta property="og:image" content="https://www.polograph.ge/renders/polograph/03-polograph-aerial.jpg">
  <meta name="twitter:image" content="https://www.polograph.ge/renders/polograph/03-polograph-aerial.jpg">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
